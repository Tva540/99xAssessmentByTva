<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <h3 class="card-title text-center mb-4">
            <i class="bi bi-person-plus-fill me-2"></i>Register
          </h3>

          <form [formGroup]="form" (ngSubmit)="onSubmit()">
            <div class="mb-3">
              <label class="form-label" for="displayName">Display Name</label>
              <input id="displayName" type="text" class="form-control" formControlName="displayName" autocomplete="name">
            </div>

            <div class="mb-3">
              <label class="form-label" for="email">Email</label>
              <input id="email" type="email" class="form-control" formControlName="email" autocomplete="email">
            </div>

            <div class="mb-3">
              <label class="form-label" for="password">Password</label>
              <input id="password" type="password" class="form-control" formControlName="password" autocomplete="new-password">
              <div class="form-text">Min 8 characters, uppercase, lowercase, digit, special char</div>
            </div>

            @if (errorMessage()) {
              <div class="alert alert-danger py-2">{{ errorMessage() }}</div>
            }

            @if (successMessage()) {
              <div class="alert alert-success py-2">{{ successMessage() }}</div>
            }

            <button type="submit" class="btn btn-primary w-100" [disabled]="form.invalid || loading()">
              @if (loading()) {
                <span class="spinner-border spinner-border-sm me-2"></span>
              }
              Create Account
            </button>
          </form>

          <hr class="my-4">
          <div class="text-center small">
            Already have an account? <a routerLink="/login">Sign In</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
